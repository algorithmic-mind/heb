{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>پرداخت موفق</title>
  <link rel="stylesheet" href="{% static "css/bootstrap.rtl.min.css" %}">
  <link rel="stylesheet" href="{% static "css/styles.css" %}">
  <link rel="stylesheet" href="{% static "css/bootstrap-icons.css" %}">
  <link rel="shortcut icon" href="{{site_settings.site_favicon.url}}" type="image/x-icon">
</head>
<body style="background-color: #143770;">

  <div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card login-card p-4 bg-white">
      <div class="text-center mb-4">
        <!-- آیکون موفقیت -->
        <div class="success-icon mb-3">
          <i class="bi bi-check-circle-fill text-success" style="font-size: 3rem;"></i>
        </div>
        
        <h5 class="mt-3 fw-bold text-success">پرداخت با موفقیت انجام شد!</h5>
        
        <div class="mt-3">
          <small class="text-muted">تراکنش شما با موفقیت تکمیل شد</small>
        </div>
      </div>

      <!-- اطلاعات پرداخت -->
      <div class="payment-info mb-4">
        <div class="d-flex justify-content-between mb-2">
          <span class="text-muted">شماره تراکنش:</span>
          <span class="fw-bold" id="ref_id">123456789</span>
        </div>
        <div class="d-flex justify-content-between mb-2">
          <span class="text-muted">مبلغ پرداختی:</span>
          <span class="fw-bold">۲۹۹,۰۰۰ تومان</span>
        </div>
        <div class="d-flex justify-content-between mb-2">
          <span class="text-muted">تاریخ پرداخت:</span>
          <span class="fw-bold">۱۴۰۲/۱۰/۱۵ - ۱۴:۳۰</span>
        </div>
        <div class="d-flex justify-content-between">
          <span class="text-muted">وضعیت:</span>
          <span class="badge bg-success">موفق</span>
        </div>
      </div>

      <!-- دکمه‌های اقدام -->
      <div class="d-grid gap-2">
        <button class="btn btn-success rounded-4" onclick="downloadInvoice()">
          <i class="bi bi-download me-2"></i>
            دانلود فاکتور
        </button>
        
        <a class="btn btn-outline-primary rounded-4" href="#">
          <i class="bi bi-house me-2"></i>
          بازگشت به پنل کاربری
        </a>
        
        <a class="btn btn-outline-secondary rounded-4" href="{% url "course:courses" %}">
          <i class="bi bi-book me-2"></i>
          مشاهده دوره‌ها
        </a>
      </div>

      <!-- اطلاعات امنیتی -->
      <div class="text-center mt-4 pt-3 border-top">
        <small class="text-muted">تنها آدرس ایمن ما</small>
        <br>
        <small class="text-success">
          https://hebrew-academy.ir 
          <i class="bi bi-lock-fill"></i>
        </small>
      </div>
    </div>
  </div>

  <script>
    // توابع برای دکمه‌ها
    function downloadInvoice() {
     print();
    }

  

    // نمایش خودکار اطلاعات پرداخت (می‌تواند از URL پارامتر بگیرد)
    document.addEventListener('DOMContentLoaded', function() {

      const urlParams = new URLSearchParams(window.location.search);
      const amount = urlParams.get('amount');
      const refId = urlParams.get('ref_id');
      
      if (amount) {
        document.querySelector('.payment-info .fw-bold:nth-child(2)').textContent = 
          new Intl.NumberFormat('fa-IR').format(amount) + ' تومان';
      }
      
      if (refId) {
        document.getElementById('.payment-info .fw-bold:first-child').textContent = refId;
      }

    });

    
  </script>

</body>
</html>
