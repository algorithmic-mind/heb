{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>خطا</title>
 <link rel="stylesheet" href="{% static "css/bootstrap.rtl.min.css" %}">
  <link rel="stylesheet" href="{% static "css/styles.css" %}">
  <link rel="stylesheet" href="{% static "css/bootstrap-icons.css" %}">
  <link rel="shortcut icon" href="{{site_settings.site_favicon.url}}" type="image/x-icon">
</head>
<body style="background-color: #143770;">

  <div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card login-card p-4 bg-white">
      <div class="text-center mb-4">
        <!-- آیکون لغو -->
        <div class="cancel-icon mb-3">
          <i class="bi bi-x-circle-fill text-danger" style="font-size: 3rem;"></i>
        </div>
        
        <h5 class="mt-3 fw-bold text-danger">خطای فنی در روند پرداخت</h5>
        
        
      </div>

    

      <!-- پیام توضیحی -->
      <div class="alert alert-warning text-center mb-4">
        <small>
          <i class="bi bi-exclamation-triangle me-2"></i>
          یک خطای فنی در پرداخت وجود دارد. لطفا با پشتیبانی سایت ارتباط بگیرید
        </small>
      </div>

      <!-- دکمه‌های اقدام -->
      <div class="d-grid gap-2">
        
        <a class="btn btn-outline-secondary rounded-4" href="#">
          <i class="bi bi-house me-2"></i>
          بازگشت به پنل کاربری
        </a>
        
        <button class="btn btn-outline-dark rounded-4" onclick="contactSupport()">
          <i class="bi bi-headset me-2"></i>
          پشتیبانی آنلاین
        </button>
      </div>

      <!-- اطلاعات امنیتی -->
      <div class="text-center mt-4 pt-3 border-top">
        <small class="text-muted">تنها آدرس ایمن ما</small>
        <br>
        <small class="text-success">
          https://hebrew-academy.ir 
          <i class="bi bi-lock-fill"></i>
        </small>
        <br>
        <small class="text-muted mt-2 d-block">
          برای مشکلات پرداخت: 
          <a href="tel:{{site_settings.contact_phone}}" class="text-decoration-none">{{site_settings.contact_phone}}</a>
        </small>
      </div>
    </div>
  </div>

  <script>
    
  
  </script>

</body>
</html>
