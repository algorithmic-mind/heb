{% extends 'authentication/base.html' %}
{% load static %}
{% block main %}

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card login-card p-4 bg-white">
      <div class="text-center mb-4">
        
        <h5 class="mt-3 fw-bold">ورود به آکادمی عبری ایران  </h5>

       
      </div>

      

      <form id="otp-form" class="needs-validation" novalidate method="post" action="{% url 'account:verify_otp' %}"
      hx-post="{% url 'account:verify_otp' %}" 
      hx-target="#otp-messages" 
      hx-swap="innerHTML"
      >
      {% csrf_token %}
    <div class="mb-3">
      <div class="justify-content-center text-center">
        <label class="form-label text-center">کد تایید</label>
      </div>
        
        <div class="d-flex justify-content-center otp-input-group" dir="ltr">
            <input type="text" class="form-control otp-input rounded-4 text-center" name="c_1" maxlength="1" inputmode="numeric" pattern="[0-9]*" required oninput="convertNumbersInstant(this)" autocomplete="off">
            <input type="text" class="form-control otp-input rounded-4 text-center" name="c_2" maxlength="1" inputmode="numeric" pattern="[0-9]*" required oninput="convertNumbersInstant(this)" autocomplete="off">
            <input type="text" class="form-control otp-input rounded-4 text-center" name="c_3" maxlength="1" inputmode="numeric" pattern="[0-9]*" required oninput="convertNumbersInstant(this)" autocomplete="off">
            <input type="text" class="form-control otp-input rounded-4 text-center" name="c_4" maxlength="1" inputmode="numeric" pattern="[0-9]*" required oninput="convertNumbersInstant(this)" autocomplete="off">
        </div>
        <input type="hidden" id="otp" name="otp">
        <div class="invalid-feedback otp-invalid-feedback text-center">
            لطفاً کد تایید ۴ رقمی را کامل وارد کنید
        </div>
    </div>
    <button type="submit" class="btn btn-primary rounded-4 w-100">ورود</button>
    <div class="text-center mt-3">
        <small class="text-muted">کد دریافت نکردید؟ <a href="{% url 'account:login' %}" class="text-purple resend-otp" style="text-decoration: none;">ارسال مجدد</a></small>
    </div>


     <div id="otp-messages" class="mt-2"></div>


</form>

    </div>
  </div>
   <script src="{% static '/js/verify.js' %}"></script>

{% endblock main %}
